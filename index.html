<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemi i Ofertave - JETON THAQI</title>
    <style>
        :root {
            --primary-color: #1a252f;
            --accent-color: #f39c12;
            --text-color: #333;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Header Style */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .company-info h1 {
            margin: 0;
            font-size: 28px;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .company-info p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #7f8c8d;
        }

        .doc-title {
            text-align: right;
        }

        .doc-title h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 32px;
        }

        /* Client & Meta Details */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Table Style */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            table-layout: fixed; /* Forcon kolonat të qëndrojnë në vend */
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: left;
            padding: 12px;
            font-size: 14px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #dcdde1;
        }

        td input {
            width: 100%;
            box-sizing: border-box;
        }

        .td-veprime {
            text-align: center;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #2c3e50;
        }

        .btn-danger {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-add-row {
            background-color: #34495e;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn-success:hover {
            background-color: #27ae60;
        }

        /* Summary section */
        .summary-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .summary-box {
            width: 300px;
            font-size: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-row.total {
            border-bottom: none;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            padding-top: 15px;
        }

        .actions-bar {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
        }

        /* Truku i ri që heq shkrimet e browserit automatikisht në PC dhe Telefon */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm; /* Kjo e detyron telefonin t'i fshijë shkrimet lart dhe poshtë */
            }
            body {
                background-color: #fff !important;
                color: #000 !important;
                padding: 20mm !important; /* Kjo krijon hapësirën e pastër të dokumentit */
                margin: 0 !important;
            }
            .container {
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
            }
            .actions-bar, .btn-danger, .btn-add-row, .td-veprime, th:last-child, td:last-child {
                display: none !important;
            }
            table {
                width: 100% !important;
            }
            th:nth-child(1) { width: 45% !important; }
            th:nth-child(2) { width: 15% !important; }
            th:nth-child(3) { width: 12% !important; }
            th:nth-child(4) { width: 13% !important; }
            th:nth-child(5) { width: 15% !important; }
            
            input, textarea {
                border: none !important;
                padding: 0 !important;
                background: transparent !important;
                resize: none !important;
                width: 100% !important;
                color: #000 !important;
                font-size: 14px !important;
                -webkit-appearance: none;
            }
            .input-group label {
                margin-bottom: 2px !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="company-info">
            <h1>JETON THAQI</h1>
            <p>Instalime Elektrike në Shtëpi & Objekte</p>
            <p>Drenas, Kosovë | Tel: +383 44 776 403</p>
        </div>
        <div class="doc-title">
            <h2>OFERTË</h2>
            <div class="input-group" style="margin-top: 10px;">
                <input type="text" placeholder="Nr. i Ofertës (p.sh. 01/2026)" style="text-align: right; font-weight: bold;">
            </div>
        </div>
    </div>

    <div class="details-grid">
        <div class="client-details">
            <h4 style="margin-top: 0; color: var(--primary-color);">Për: (Klienti)</h4>
            <div class="input-group">
                <label>Emri i Klientit / Kompanisë</label>
                <input type="text" placeholder="Filan Fisteku">
            </div>
            <div class="input-group">
                <label>Lokacioni / Adresa</label>
                <input type="text" placeholder="Prishtinë">
            </div>
        </div>
        <div class="meta-details">
            <h4 style="margin-top: 0; color: var(--primary-color); text-align: right;">&nbsp;</h4>
            <div class="input-group">
                <label style="text-align: right;">Data e Ofertës</label>
                <input type="date" id="oferta-data" style="text-align: right;">
            </div>
            <div class="input-group">
                <label style="text-align: right;">Afati i Validitetit</label>
                <input type="text" placeholder="30 Ditë" style="text-align: right;">
            </div>
        </div>
    </div>

    <table id="items-table">
        <thead>
            <tr>
                <th style="width: 45%;">Përshkrimi i Punës / Materialit</th>
                <th style="width: 15%;">Njësia</th>
                <th style="width: 12%;">Sasia</th>
                <th style="width: 13%;">Çmimi (€)</th>
                <th style="width: 15%;">Totali (€)</th>
                <th class="td-veprime" style="width: 10%;">Fshij</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Përshkrimi..."></td>
                <td><input type="text" placeholder="Njësia"></td>
                <td><input type="number" class="qty" value="1" oninput="llogaritRreshtin(this)"></td>
                <td><input type="number" class="price" value="0.00" step="0.01" oninput="llogaritRreshtin(this)"></td>
                <td><input type="number" class="total-row" value="0.00" readonly></td>
                <td class="td-veprime"><button class="btn btn-danger" onclick="fshijRreshtin(this)">X</button></td>
            </tr>
        </tbody>
    </table>

    <button class="btn btn-add-row" onclick="shtoRresht()">+ Shto Pozicion të Ri</button>

    <div class="summary-container">
        <div class="summary-box">
            <div class="summary-row">
                <span>Nëntotali:</span>
                <span id="subtotal">0.00 €</span>
            </div>
            <div class="summary-row.total" style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-top: 10px;">
                <span>TOTALI:</span>
                <span id="grand-total" style="color: #2c3e50;">0.00 €</span>
            </div>
        </div>
    </div>

    <div class="input-group" style="margin-top: 30px;">
        <label>Kushtet e pagesës / Shënime shtesë</label>
        <textarea rows="3" placeholder="P.sh. 50% para fillimit të punimeve, 50% pas përfundimit."></textarea>
    </div>

    <div class="actions-bar">
        <span style="color: #7f8c8d; font-size: 13px; align-self: center;">Plotësoni të dhënat dhe klikoni butonin djathtas për ta ruajtur të pastër.</span>
        <button class="btn btn-success" onclick="window.print()">🖨️ Printo / Ruaj si PDF</button>
    </div>
</div>

<script>
    document.getElementById('oferta-data').valueAsDate = new Date();

    function shtoRresht() {
        const table = document.getElementById('items-table').getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();

        newRow.innerHTML = `
            <td><input type="text" placeholder="Përshkrimi..."></td>
            <td><input type="text" placeholder="Njësia"></td>
            <td><input type="number" class="qty" value="1" oninput="llogaritRreshtin(this)"></td>
            <td><input type="number" class="price" value="0.00" step="0.01" oninput="llogaritRreshtin(this)"></td>
            <td><input type="number" class="total-row" value="0.00" readonly></td>
            <td class="td-veprime"><button class="btn btn-danger" onclick="fshijRreshtin(this)">X</button></td>
        `;
    }

    function fshijRreshtin(button) {
        const row = button.parentNode.parentNode;
        row.parentNode.removeChild(row);
        llogaritTotaleve();
    }

    function llogaritRreshtin(element) {
        const row = element.parentNode.parentNode;
        const qty = parseFloat(row.querySelector('.qty').value) || 0;
        const price = parseFloat(row.querySelector('.price').value) || 0;
        const totalRow = row.querySelector('.total-row');
        
        const total = qty * price;
        totalRow.value = total.toFixed(2);
        
        llogaritTotaleve();
    }

    function llogaritTotaleve() {
        const totalRows = document.querySelectorAll('.total-row');
        let subtotal = 0;
        
        totalRows.forEach(row => {
            subtotal += parseFloat(row.value) || 0;
        });
        
        document.getElementById('subtotal').innerText = subtotal.toFixed(2) + ' €';
        document.getElementById('grand-total').innerText = subtotal.toFixed(2) + ' €';
    }
</script>

</body>
</html>
